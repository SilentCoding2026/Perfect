name: PR Checks

on:
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        profile: minimal
        components: rustfmt, clippy

    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: pr-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          pr-cargo-

    - name: Install FFmpeg
      run: choco install ffmpeg -y

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Clippy
      run: cargo clippy -- -D warnings

    - name: Build
      run: cargo build --release --verbose

    - name: Run tests
      run: cargo test --release --verbose

    - name: Validate examples
      run: |
        Get-ChildItem examples/*.anim | ForEach-Object {
          Write-Output "Checking $($_.Name)..."
          cargo run --release -- check $_.FullName
        }

    - name: Render test
      run: |
        cargo run --release -- render examples/the-last-barista.anim -o output.mp4 --sequential
        if (!(Test-Path output.mp4)) { exit 1 }
        Write-Output "Render test passed!"

  security:
    name: Security Audit
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        profile: minimal

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit || true