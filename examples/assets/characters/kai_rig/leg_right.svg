<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 110">
  <!-- Upper leg / jeans -->
  <path d="M3 0 L29 0 L28 4 Q27 8 27 12 L25 68 Q24 72 22 72 L10 72 Q8 72 7 68 L5 12 Q5 8 4 4 Z" fill="#3d5a80"/>

  <!-- Jean pocket outline (mirrored) -->
  <path d="M26 4 L18 4 L18 18 L26 16 Z" fill="none" stroke="#34506e" stroke-width="0.8"/>

  <!-- Jean seam -->
  <line x1="16" y1="0" x2="16" y2="72" stroke="#34506e" stroke-width="0.6" opacity="0.5"/>

  <!-- Knee crease -->
  <path d="M9 48 Q16 52 23 48" fill="none" stroke="#34506e" stroke-width="0.8" opacity="0.5"/>

  <!-- Lower leg / jeans -->
  <path d="M7 72 L25 72 L24 88 L8 88 Z" fill="#3d5a80"/>

  <!-- Jean cuff -->
  <rect x="7" y="86" width="18" height="4" rx="1" fill="#365475"/>

  <!-- Ankle -->
  <rect x="8" y="90" width="16" height="3" fill="#e8c8a0"/>

  <!-- Sneaker -->
  <path d="M4 93 L28 93 Q30 93 31 96 L31 102 Q31 106 28 107 L2 107 Q0 106 0 103 L0 100 Q0 96 2 94 Z" fill="#e63946"/>

  <!-- Sneaker sole -->
  <rect x="0" y="105" width="32" height="5" rx="2" fill="#ddd"/>
  <rect x="0" y="107" width="32" height="3" rx="1" fill="#bbb"/>

  <!-- Sneaker toe cap -->
  <path d="M0 100 Q0 94 6 93 L4 93 Q0 96 0 100 Z" fill="#cc2f3b"/>
  <path d="M0 100 Q2 96 8 95 L4 96 Q1 98 0 102 Z" fill="white" opacity="0.2"/>

  <!-- Lace detail -->
  <line x1="12" y1="94" x2="20" y2="94" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="96.5" x2="21" y2="96.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="99" x2="20" y2="99" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Lace cross pattern -->
  <line x1="12" y1="94" x2="20" y2="96.5" stroke="white" stroke-width="0.6" opacity="0.7"/>
  <line x1="20" y1="94" x2="12" y2="96.5" stroke="white" stroke-width="0.6" opacity="0.7"/>
  <line x1="12" y1="96.5" x2="20" y2="99" stroke="white" stroke-width="0.6" opacity="0.7"/>
  <line x1="20" y1="96.5" x2="12" y2="99" stroke="white" stroke-width="0.6" opacity="0.7"/>

  <!-- Sneaker accent stripe -->
  <path d="M2 100 Q10 96 28 100" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>
</svg>
