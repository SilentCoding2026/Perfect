<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <!-- Hood behind neck -->
  <path d="M28 0 Q50 -4 72 0 L76 16 Q50 12 24 16 Z" fill="#3a6d8c"/>

  <!-- Main hoodie body -->
  <path d="M15 10 Q10 10 8 20 L4 100 Q4 112 16 114 L84 114 Q96 112 96 100 L92 20 Q90 10 85 10 Z" fill="#457b9d"/>

  <!-- Hoodie shoulder area / yoke - slightly darker -->
  <path d="M15 10 Q50 6 85 10 L88 30 Q50 24 12 30 Z" fill="#3d6f8e" opacity="0.5"/>

  <!-- Hood collar behind neck -->
  <path d="M30 4 Q50 0 70 4 Q72 14 68 18 Q50 14 32 18 Q28 14 30 4 Z" fill="#3a6d8c"/>

  <!-- Center seam -->
  <line x1="50" y1="18" x2="50" y2="114" stroke="#3a6d8c" stroke-width="1" opacity="0.5"/>

  <!-- Front pocket -->
  <path d="M22 62 L78 62 L80 90 Q50 94 20 90 Z" fill="none" stroke="#3a6d8c" stroke-width="1.5"/>
  <!-- Pocket opening -->
  <path d="M36 62 Q50 68 64 62" fill="none" stroke="#3a6d8c" stroke-width="1.2"/>

  <!-- Hoodie strings -->
  <line x1="44" y1="14" x2="40" y2="48" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="14" x2="60" y2="48" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
  <!-- String tips -->
  <rect x="38" y="46" width="4" height="6" rx="1" fill="#bbb"/>
  <rect x="58" y="46" width="4" height="6" rx="1" fill="#bbb"/>

  <!-- Bottom hem -->
  <path d="M4 108 Q50 116 96 108" fill="none" stroke="#3a6d8c" stroke-width="1.5"/>

  <!-- Slight wrinkle lines -->
  <path d="M24 40 Q28 44 24 50" fill="none" stroke="#3a6d8c" stroke-width="0.8" opacity="0.6"/>
  <path d="M76 40 Q72 44 76 50" fill="none" stroke="#3a6d8c" stroke-width="0.8" opacity="0.6"/>
