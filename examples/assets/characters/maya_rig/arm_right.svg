<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 35 100" width="35" height="100">
  <!-- Upper arm - coat sleeve -->
  <path d="M4 0 L30 0 Q32 2, 32 6 L30 48 Q28 50, 26 50 L8 50 Q6 50, 4 48 L2 6 Q2 2, 4 0 Z" fill="#8B7355"/>
  <!-- Sleeve seam -->
  <line x1="17" y1="2" x2="17" y2="48" stroke="#7a6448" stroke-width="0.6" opacity="0.4"/>
  <!-- Shoulder crease -->
  <path d="M6 4 Q17 8, 28 4" stroke="#7a6448" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Lower arm / forearm sleeve -->
  <path d="M6 50 L28 50 Q30 52, 29 56 L27 76 Q26 78, 24 78 L10 78 Q8 78, 7 76 L5 56 Q4 52, 6 50 Z" fill="#8B7355"/>
  <!-- Elbow fold -->
  <path d="M8 50 Q17 54, 26 50" stroke="#7a6448" stroke-width="1" fill="none"/>

  <!-- Cuff -->
  <rect x="8" y="76" width="18" height="6" rx="1" fill="#7a6448"/>

  <!-- Hand -->
  <path d="M10 82 Q9 84, 9 88 Q9 94, 14 96 L20 96 Q25 94, 25 88 Q25 84, 24 82 Z" fill="#c68e6a"/>
  <!-- Thumb -->
  <path d="M25 86 Q29 88, 29 91 Q29 94, 26 94 Q24 93, 24 90" fill="#c68e6a"/>
  <!-- Finger lines -->
  <line x1="14" y1="92" x2="14" y2="96" stroke="#b07a58" stroke-width="0.5" opacity="0.5"/>
  <line x1="17" y1="92" x2="17" y2="96" stroke="#b07a58" stroke-width="0.5" opacity="0.5"/>
  <line x1="20" y1="92" x2="20" y2="96" stroke="#b07a58" stroke-width="0.5" opacity="0.5"/>
</svg>
