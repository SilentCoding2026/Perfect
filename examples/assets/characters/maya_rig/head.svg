<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130">
  <!-- Dark hair behind head -->
  <ellipse cx="60" cy="52" rx="42" ry="44" fill="#1a0a00"/>
  <!-- Hair strands falling to shoulders - left side -->
  <path d="M18 52 Q14 80, 10 110 Q12 112, 18 110 Q22 85, 24 58 Z" fill="#1a0a00"/>
  <path d="M24 58 Q22 82, 20 108 Q24 110, 28 108 Q30 82, 30 60 Z" fill="#1a0a00"/>
  <!-- Hair strands falling to shoulders - right side -->
  <path d="M96 58 Q98 82, 100 108 Q104 110, 106 108 Q102 80, 100 52 Z" fill="#1a0a00"/>
  <path d="M90 60 Q92 82, 94 108 Q98 110, 100 108 Q96 82, 94 58 Z" fill="#1a0a00"/>

  <!-- Face shape -->
  <ellipse cx="60" cy="62" rx="34" ry="38" fill="#c68e6a"/>
  <!-- Jaw definition -->
  <path d="M30 62 Q32 92, 60 100 Q88 92, 90 62" fill="#c68e6a"/>

  <!-- Eyes -->
  <ellipse cx="45" cy="56" rx="7" ry="5" fill="white"/>
  <ellipse cx="75" cy="56" rx="7" ry="5" fill="white"/>
  <circle cx="46" cy="56" r="3" fill="#3a2010"/>
  <circle cx="76" cy="56" r="3" fill="#3a2010"/>
  <circle cx="47" cy="55" r="1.2" fill="black"/>
  <circle cx="77" cy="55" r="1.2" fill="black"/>
  <!-- Eyebrows -->
  <path d="M36 48 Q45 44, 54 48" stroke="#1a0a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M66 48 Q75 44, 84 48" stroke="#1a0a00" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Eyelashes -->
  <path d="M38 52 L36 50" stroke="#1a0a00" stroke-width="1" stroke-linecap="round"/>
  <path d="M82 52 L84 50" stroke="#1a0a00" stroke-width="1" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M58 62 Q55 72, 56 74 Q60 76, 64 74 Q65 72, 62 62" fill="#b07a58" opacity="0.5"/>

  <!-- Mouth -->
  <path d="M48 82 Q54 88, 60 87 Q66 88, 72 82" stroke="#8a4030" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Lower lip hint -->
  <path d="M52 86 Q60 92, 68 86" fill="#b87060" opacity="0.4"/>

  <!-- Hair fringe over forehead -->
  <path d="M22 42 Q30 20, 50 18 Q55 30, 42 40 Z" fill="#1a0a00"/>
  <path d="M36 36 Q45 14, 65 16 Q60 28, 48 34 Z" fill="#1a0a00"/>
  <path d="M56 18 Q75 14, 90 28 Q82 34, 70 30 Q62 24, 56 22 Z" fill="#1a0a00"/>

  <!-- Fedora hat -->
  <!-- Hat brim -->
  <ellipse cx="60" cy="26" rx="56" ry="12" fill="#4a3728"/>
  <!-- Hat crown -->
  <path d="M28 26 Q28 2, 60 0 Q92 2, 92 26 Z" fill="#4a3728"/>
  <!-- Hat band -->
  <rect x="30" y="20" width="60" height="5" rx="2" fill="#3a2718"/>
  <!-- Hat crease -->
  <path d="M40 8 Q60 14, 80 8" stroke="#3a2718" stroke-width="1.5" fill="none"/>
  <!-- Brim shadow -->
  <ellipse cx="60" cy="27" rx="54" ry="10" fill="#3d2c1e" opacity="0.3"/>

  <!-- Ear hints -->
  <ellipse cx="27" cy="62" rx="5" ry="8" fill="#b87a5a"/>
  <ellipse cx="93" cy="62" rx="5" ry="8" fill="#b87a5a"/>

  <!-- Neck -->
  <rect x="48" y="98" width="24" height="16" rx="4" fill="#c68e6a"/>
  <rect x="46" y="108" width="28" height="8" rx="2" fill="#c68e6a"/>
</svg>
