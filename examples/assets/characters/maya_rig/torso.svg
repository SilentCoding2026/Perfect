<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Shirt/blouse visible at neckline -->
  <path d="M35 4 Q50 10, 65 4 L65 18 Q50 22, 35 18 Z" fill="#d4c5a9"/>

  <!-- Trench coat body -->
  <path d="M8 14 L20 4 Q50 12, 80 4 L92 14 L96 118 L56 118 L56 118 L44 118 L4 118 Z" fill="#8B7355"/>

  <!-- Coat front opening / overlap -->
  <path d="M50 22 L50 118" stroke="#7a6448" stroke-width="1"/>

  <!-- Left lapel -->
  <path d="M20 4 L50 22 L42 32 L12 16 Z" fill="#7a6448"/>
  <path d="M20 4 L50 22 L42 32 L12 16 Z" stroke="#6a5438" stroke-width="0.8" fill="none"/>

  <!-- Right lapel -->
  <path d="M80 4 L50 22 L58 32 L88 16 Z" fill="#7a6448"/>
  <path d="M80 4 L50 22 L58 32 L88 16 Z" stroke="#6a5438" stroke-width="0.8" fill="none"/>

  <!-- Coat collar -->
  <path d="M18 6 Q50 16, 82 6 Q84 2, 80 4 Q50 14, 20 4 Q16 2, 18 6 Z" fill="#7a6448"/>

  <!-- Belt -->
  <rect x="6" y="72" width="88" height="8" rx="1" fill="#5a4430"/>
  <!-- Belt buckle -->
  <rect x="44" y="71" width="12" height="10" rx="2" fill="#b8a060" stroke="#8a7040" stroke-width="1"/>
  <rect x="48" y="73" width="4" height="6" rx="1" fill="none" stroke="#8a7040" stroke-width="1"/>

  <!-- Coat buttons -->
  <circle cx="50" cy="42" r="3" fill="#6a5438" stroke="#5a4428" stroke-width="0.5"/>
  <circle cx="50" cy="56" r="3" fill="#6a5438" stroke="#5a4428" stroke-width="0.5"/>

  <!-- Coat pockets -->
  <path d="M14 86 L38 86 L38 100 Q26 102, 14 100 Z" fill="none" stroke="#7a6448" stroke-width="1.5"/>
  <line x1="14" y1="86" x2="38" y2="86" stroke="#6a5438" stroke-width="2"/>
  <path d="M62 86 L86 86 L86 100 Q74 102, 62 100 Z" fill="none" stroke="#7a6448" stroke-width="1.5"/>
  <line x1="62" y1="86" x2="86" y2="86" stroke="#6a5438" stroke-width="2"/>

  <!-- Bottom coat flare -->
  <path d="M4 118 Q4 116, 6 108 L50 108 L50 118 Z" fill="#8B7355"/>
  <path d="M96 118 Q96 116, 94 108 L50 108 L50 118 Z" fill="#8B7355"/>

  <!-- Coat seam lines -->
  <line x1="30" y1="32" x2="24" y2="118" stroke="#7a6448" stroke-width="0.6" opacity="0.5"/>
  <line x1="70" y1="32" x2="76" y2="118" stroke="#7a6448" stroke-width="0.6" opacity="0.5"/>

  <!-- Shoulder seams -->
  <path d="M8 14 Q14 12, 20 14" stroke="#7a6448" stroke-width="1" fill="none"/>
  <path d="M80 14 Q86 12, 92 14" stroke="#7a6448" stroke-width="1" fill="none"/>
</svg>
