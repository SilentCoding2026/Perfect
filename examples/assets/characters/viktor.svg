<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 440" width="200" height="440">
  <!-- Viktor - tall, suit, slicked back hair, villain vibes -->
  
  <!-- Legs -->
  <rect x="70" y="310" width="24" height="100" rx="5" fill="#1a1a2e"/>
  <rect x="106" y="310" width="24" height="100" rx="5" fill="#1a1a2e"/>
  <!-- Shoes (polished) -->
  <ellipse cx="82" cy="413" rx="22" ry="10" fill="#0a0a0a"/>
  <ellipse cx="118" cy="413" rx="22" ry="10" fill="#0a0a0a"/>
  
  <!-- Suit body -->
  <path d="M52,150 L52,315 Q52,325 62,325 L138,325 Q148,325 148,315 L148,150 Q148,140 138,135 L62,135 Q52,140 52,150Z" fill="#1a1a2e"/>
  <!-- Suit jacket lapels -->
  <path d="M72,135 L100,185 L85,135Z" fill="#14142a"/>
  <path d="M128,135 L100,185 L115,135Z" fill="#14142a"/>
  <!-- Shirt/tie -->
  <rect x="95" y="148" width="10" height="80" rx="2" fill="#8b0000"/>
  <polygon points="95,148 105,148 100,158" fill="#6b0000"/>
  <!-- Pocket square -->
  <polygon points="130,165 140,165 138,175 132,175" fill="#8b0000"/>
  
  <!-- Neck -->
  <rect x="86" y="115" width="28" height="25" rx="5" fill="#d4b896"/>
  
  <!-- Head -->
  <ellipse cx="100" cy="78" rx="44" ry="48" fill="#d4b896"/>
  <!-- Hair (slicked back, dark) -->
  <path d="M56,68 Q55,22 100,12 Q145,22 144,68 Q142,40 100,32 Q58,40 56,68Z" fill="#0a0a0a"/>
  <!-- Sideburns -->
  <rect x="56" y="62" width="6" height="20" rx="2" fill="#0a0a0a"/>
  <rect x="138" y="62" width="6" height="20" rx="2" fill="#0a0a0a"/>
  
  <!-- Pose: idle -->
  <g id="pose-idle">
    <rect x="30" y="155" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(-5,42,155)"/>
    <rect x="146" y="155" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(5,158,155)"/>
    <ellipse cx="28" cy="248" rx="11" ry="12" fill="#d4b896"/>
    <ellipse cx="172" cy="248" rx="11" ry="12" fill="#d4b896"/>
    <!-- Cold stare -->
    <ellipse cx="82" cy="75" rx="5" ry="4" fill="#0a0a0a"/>
    <ellipse cx="118" cy="75" rx="5" ry="4" fill="#0a0a0a"/>
    <path d="M88,100 Q100,96 112,100" stroke="#6b4a30" stroke-width="2.5" fill="none"/>
    <line x1="73" y1="66" x2="90" y2="68" stroke="#0a0a0a" stroke-width="2.5"/>
    <line x1="110" y1="68" x2="127" y2="66" stroke="#0a0a0a" stroke-width="2.5"/>
  </g>
  
  <!-- Pose: menacing -->
  <g id="pose-menacing" style="display:none">
    <rect x="32" y="155" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(-15,44,155)"/>
    <rect x="144" y="155" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(15,156,155)"/>
    <ellipse cx="22" cy="242" rx="11" ry="12" fill="#d4b896"/>
    <ellipse cx="178" cy="242" rx="11" ry="12" fill="#d4b896"/>
    <!-- Menacing face -->
    <ellipse cx="82" cy="75" rx="6" ry="3" fill="#0a0a0a"/>
    <ellipse cx="118" cy="75" rx="6" ry="3" fill="#0a0a0a"/>
    <path d="M85,98 Q100,105 115,98" stroke="#6b4a30" stroke-width="2.5" fill="none"/>
    <line x1="72" y1="68" x2="90" y2="65" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="110" y1="65" x2="128" y2="68" stroke="#0a0a0a" stroke-width="3"/>
  </g>
  
  <!-- Pose: angry -->
  <g id="pose-angry" style="display:none">
    <rect x="28" y="148" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(-30,40,148)"/>
    <rect x="148" y="148" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(30,160,148)"/>
    <ellipse cx="12" cy="228" rx="12" ry="13" fill="#d4b896"/>
    <ellipse cx="188" cy="228" rx="12" ry="13" fill="#d4b896"/>
    <!-- Angry face -->
    <ellipse cx="82" cy="75" rx="6" ry="5" fill="#0a0a0a"/>
    <ellipse cx="118" cy="75" rx="6" ry="5" fill="#0a0a0a"/>
    <path d="M85,100 L115,100" stroke="#6b4a30" stroke-width="3" fill="none"/>
    <line x1="72" y1="70" x2="90" y2="63" stroke="#0a0a0a" stroke-width="3.5"/>
    <line x1="110" y1="63" x2="128" y2="70" stroke="#0a0a0a" stroke-width="3.5"/>
  </g>
  
  <!-- Pose: surprised -->
  <g id="pose-surprised" style="display:none">
    <rect x="25" y="148" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(-25,37,148)"/>
    <rect x="151" y="148" width="24" height="90" rx="8" fill="#1a1a2e" transform="rotate(25,163,148)"/>
    <ellipse cx="16" cy="232" rx="11" ry="12" fill="#d4b896"/>
    <ellipse cx="184" cy="232" rx="11" ry="12" fill="#d4b896"/>
    <!-- Shocked face -->
    <ellipse cx="82" cy="73" rx="7" ry="8" fill="#0a0a0a"/>
    <ellipse cx="118" cy="73" rx="7" ry="8" fill="#0a0a0a"/>
    <ellipse cx="82" cy="73" rx="3" ry="3" fill="white"/>
    <ellipse cx="118" cy="73" rx="3" ry="3" fill="white"/>
    <ellipse cx="100" cy="104" rx="9" ry="11" fill="#6b4a30"/>
    <line x1="72" y1="60" x2="90" y2="64" stroke="#0a0a0a" stroke-width="3"/>
    <line x1="110" y1="64" x2="128" y2="60" stroke="#0a0a0a" stroke-width="3"/>
  </g>
</svg>
