<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Neck -->
  <rect x="46" y="100" width="28" height="20" rx="4" fill="#d4b896"/>

  <!-- Head shape — tall angular jaw -->
  <path d="M60 8 C82 8, 96 28, 96 50 C96 68, 90 82, 80 92 L68 102 C64 104, 56 104, 52 102 L40 92 C30 82, 24 68, 24 50 C24 28, 38 8, 60 8Z" fill="#d4b896"/>

  <!-- Slicked-back dark hair -->
  <path d="M60 4 C86 4, 100 24, 100 48 C100 38, 96 22, 88 14 C80 6, 68 2, 60 2 C52 2, 40 6, 32 14 C24 22, 20 38, 20 48 C20 24, 34 4, 60 4Z" fill="#0a0a0a"/>
  <!-- Hair top volume -->
  <path d="M28 42 C28 20, 40 4, 60 4 C80 4, 92 20, 92 42 C92 32, 84 12, 60 12 C36 12, 28 32, 28 42Z" fill="#0a0a0a"/>
  <!-- Hair sides swept back -->
  <path d="M24 50 C22 38, 26 22, 38 12 C30 24, 26 38, 26 50 Z" fill="#0a0a0a"/>
  <path d="M96 50 C98 38, 94 22, 82 12 C90 24, 94 38, 94 50 Z" fill="#0a0a0a"/>

  <!-- Sideburns -->
  <rect x="24" y="48" width="6" height="20" rx="2" fill="#0a0a0a"/>
  <rect x="90" y="48" width="6" height="20" rx="2" fill="#0a0a0a"/>

  <!-- Brow ridge — heavy, menacing -->
  <rect x="34" y="42" width="22" height="5" rx="2" fill="#b8986e"/>
  <rect x="64" y="42" width="22" height="5" rx="2" fill="#b8986e"/>

  <!-- Eyes — cold, narrow -->
  <ellipse cx="45" cy="52" rx="9" ry="5" fill="#eee"/>
  <ellipse cx="75" cy="52" rx="9" ry="5" fill="#eee"/>
  <!-- Irises — steel grey -->
  <circle cx="47" cy="52" r="3.5" fill="#4a5568"/>
  <circle cx="77" cy="52" r="3.5" fill="#4a5568"/>
  <!-- Pupils -->
  <circle cx="47" cy="52" r="1.8" fill="#0a0a0a"/>
  <circle cx="77" cy="52" r="1.8" fill="#0a0a0a"/>
  <!-- Eye glint -->
  <circle cx="48.5" cy="50.5" r="0.8" fill="#fff"/>
  <circle cx="78.5" cy="50.5" r="0.8" fill="#fff"/>

  <!-- Eyebrows — thick, angled down inward (menacing) -->
  <path d="M34 40 L44 36 L56 39 L44 38Z" fill="#0a0a0a"/>
  <path d="M86 40 L76 36 L64 39 L76 38Z" fill="#0a0a0a"/>

  <!-- Nose — sharp angular -->
  <path d="M57 56 L60 72 L63 56" fill="none" stroke="#b8986e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54 72 L60 75 L66 72" fill="none" stroke="#b8986e" stroke-width="1.2"/>

  <!-- Mouth — thin, stern -->
  <path d="M44 82 Q52 86, 60 84 Q68 86, 76 82" fill="none" stroke="#6b4c3b" stroke-width="2" stroke-linecap="round"/>

  <!-- Chin cleft -->
  <line x1="60" y1="92" x2="60" y2="96" stroke="#b8986e" stroke-width="1" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="22" cy="56" rx="5" ry="8" fill="#d4b896"/>
  <ellipse cx="98" cy="56" rx="5" ry="8" fill="#d4b896"/>

  <!-- Scar on left cheek -->
  <path d="M30 64 L38 72" fill="none" stroke="#c4a07a" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
