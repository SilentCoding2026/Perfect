<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 35 115">
  <!-- Upper leg — dark suit trousers -->
  <path d="M4 0 L4 55 C4 58, 6 60, 8 60 L26 60 C28 60, 30 58, 30 55 L30 0Z" fill="#141428"/>
  <!-- Crease -->
  <line x1="17" y1="4" x2="17" y2="58" stroke="#1e1e38" stroke-width="0.8"/>

  <!-- Lower leg — trousers -->
  <path d="M5 58 L5 96 C5 98, 6 100, 8 100 L26 100 C28 100, 29 98, 29 96 L29 58Z" fill="#141428"/>
  <!-- Crease continues -->
  <line x1="17" y1="58" x2="17" y2="98" stroke="#1e1e38" stroke-width="0.8"/>

  <!-- Knee shadow -->
  <ellipse cx="17" cy="55" rx="10" ry="3" fill="#0e0e22" opacity="0.3"/>

  <!-- Trouser hem -->
  <rect x="4" y="96" width="26" height="4" rx="1" fill="#141428"/>
  <line x1="4" y1="96" x2="30" y2="96" stroke="#1a1a30" stroke-width="0.6"/>

  <!-- Shoe -->
  <path d="M2 100 L2 108 C2 112, 6 115, 12 115 L28 115 C32 115, 34 112, 33 108 L32 100 L2 100Z" fill="#0a0a0a"/>
  <!-- Shoe sole -->
  <path d="M2 112 C2 114, 6 115, 12 115 L28 115 C32 115, 34 114, 34 112Z" fill="#050505"/>
  <!-- Shoe shine highlight -->
  <ellipse cx="16" cy="106" rx="8" ry="2" fill="#1a1a1a" opacity="0.6"/>
  <!-- Shoe lace area -->
  <rect x="8" y="100" width="18" height="4" rx="1" fill="#0e0e0e"/>
  <line x1="12" y1="100" x2="12" y2="104" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="17" y1="100" x2="17" y2="104" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="22" y1="100" x2="22" y2="104" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>
