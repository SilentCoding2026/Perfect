  <!-- Lower leg — trousers -->
  <path d="M6 58 L6 96 C6 98, 7 100, 9 100 L27 100 C29 100, 30 98, 30 96 L30 58Z" fill="#141428"/>
  <!-- Crease continues -->
  <line x1="18" y1="58" x2="18" y2="98" stroke="#1e1e38" stroke-width="0.8"/>

  <!-- Knee shadow -->
  <ellipse cx="18" cy="55" rx="10" ry="3" fill="#0e0e22" opacity="0.3"/>

  <!-- Trouser hem -->
  <rect x="5" y="96" width="26" height="4" rx="1" fill="#141428"/>
