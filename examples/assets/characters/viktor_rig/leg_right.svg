  <ellipse cx="18" cy="106" rx="8" ry="2" fill="#1a1a1a" opacity="0.6"/>
  <!-- Shoe lace area -->
  <rect x="9" y="100" width="18" height="4" rx="1" fill="#0e0e0e"/>
  <line x1="13" y1="100" x2="13" y2="104" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="18" y1="100" x2="18" y2="104" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="23" y1="100" x2="23" y2="104" stroke="#1a1a1a" stroke-width="0.5"/>
</svg>
