<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#1a1508"/>
  <!-- sky gradient -->
  <rect width="1280" height="300" fill="#2a1a0a"/>
  <!-- sun -->
  <circle cx="640" cy="80" r="60" fill="#c88030" opacity="0.7"/>
  <!-- distant mesa -->
  <polygon points="200,300 400,200 600,300" fill="#2a2010"/>
  <polygon points="700,300 950,180 1100,300" fill="#2a2010"/>
  <!-- ground -->
  <rect x="0" y="300" width="1280" height="420" fill="#1a1508"/>
  <!-- dusty road -->
  <polygon points="500,300 780,300 900,720 380,720" fill="#1e180c" opacity="0.5"/>
</svg>
